<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth + Aether</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; overflow-x: hidden; }
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/earthandaether/home/b9d0f9b0c42b7c95a1d7a8b70d43ed49a1e1c3d1/Earth%20%2B%20Aether%20Landing%20Page.png') center/cover no-repeat; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        h1 { font-size: 4em; margin: 0 0 20px; letter-spacing: 2px; }
        p { font-size: 1.5em; margin: 0 0 30px; max-width: 600px; line-height: 1.4; }
        .cta { 
            background: rgba(255,255,255,0.2); 
            color: white; 
            padding: 15px 40px; 
            text-decoration: none; 
            border: 2px solid white; 
            border-radius: 50px; 
            font-size: 1.3em; 
            transition: background 0.3s; 
        }
        .cta:hover { background: rgba(255,255,255,0.3); }
        @media (max-width: 768px) { h1 { font-size: 2.5em; } p { font-size: 1.2em; } }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Earth + Aether</h1>
        <p>Discover the harmony of nature and spirit. Your journey starts here.</p>
        <a href="#learn-more" class="cta">Explore Now</a>
    </section>
</body>
</html>
